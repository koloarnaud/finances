<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0f0f"/>
<meta name="description" content="Gestion financière personnelle"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finances"/>
<title>Mes Finances</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Mes%20Finances%22,%22short_name%22:%22Finances%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f0f0f%22,%22theme_color%22:%22%230f0f0f%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='20'%20fill='%2318181b'/%3E%3Ctext%20y='.9em'%20font-size='80'%20x='10'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface2: #1c1c20;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --muted: #7a7870;
  --accent: #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r: 12px;
  --r-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);color:var(--text);font-family:var(--font-head);min-height:100%}
body{max-width:600px;margin:0 auto;padding:0 0 100px;min-height:100vh}

/* NAV */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;margin-bottom:8px}
.topbar-title{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.topbar-sub{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-top:2px}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:none;color:var(--muted);font-size:13px;font-family:var(--font-head);padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;transition:color .15s}
.back-btn:hover{color:var(--text)}

/* SCREENS */
.screen{display:none;padding:0 16px;animation:fadeIn .2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* YEAR GRID */
.year-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.year-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:border-color .15s,background .15s}
.year-card:hover{border-color:var(--border2);background:var(--surface2)}
.year-num{font-size:32px;font-weight:700;letter-spacing:-1px}
.year-net{font-size:13px;font-family:var(--font-mono);margin-top:6px}
.year-badge{display:inline-block;font-size:10px;font-family:var(--font-mono);padding:3px 8px;border-radius:20px;margin-top:8px}

/* MONTH GRID */
.month-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:border-color .15s}
.month-card:hover{border-color:var(--border2)}
.month-name{font-size:13px;font-weight:600}
.month-rav{font-size:12px;font-family:var(--font-mono);margin-top:5px}

/* FLASH BANNER */
.flash{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.flash-label{font-size:11px;font-family:var(--font-mono);color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.flash-amount{font-size:38px;font-weight:700;letter-spacing:-1.5px;font-family:var(--font-mono)}
.flash-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.flash-item{flex:1;min-width:80px}
.flash-item-label{font-size:10px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.flash-item-val{font-size:14px;font-family:var(--font-mono);font-weight:500;margin-top:3px}

/* SECTIONS */
.section-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.section-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
.section-header:hover{background:rgba(255,255,255,0.02)}
.section-left{display:flex;align-items:center;gap:10px}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.section-name{font-size:14px;font-weight:600}
.section-total{font-size:14px;font-family:var(--font-mono);font-weight:500}
.section-body{border-top:1px solid var(--border);padding:12px}
.section-body.hidden{display:none}

/* TX LIST */
.tx-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border-radius:var(--r-sm)}
.tx-name{font-size:13px}
.tx-right{display:flex;align-items:center;gap:10px}
.tx-amount{font-size:13px;font-family:var(--font-mono);font-weight:500}
.tx-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;transition:color .15s}
.tx-del:hover{color:var(--red)}
.tx-empty{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-bottom:10px;padding:4px 0}

/* ADD ROW */
.add-row{display:flex;gap:6px}
.add-row input{flex:1;min-width:0;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:13px;font-family:var(--font-head);padding:0 10px;outline:none;transition:border-color .15s}
.add-row input:focus{border-color:var(--border2)}
.add-row input::placeholder{color:var(--muted)}
.add-row .inp-amount{max-width:100px;font-family:var(--font-mono)}
.add-row button{height:36px;padding:0 14px;background:var(--accent-dim);border:1px solid rgba(200,241,53,0.2);border-radius:var(--r-sm);color:var(--accent);font-size:18px;cursor:pointer;transition:background .15s;flex-shrink:0}
.add-row button:hover{background:rgba(200,241,53,0.2)}

/* BILAN */
.bilan{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:10px}
.bilan-title{font-size:11px;font-family:var(--font-mono);color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.bilan-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border)}
.bilan-row:last-of-type{border-bottom:none;font-weight:600;font-size:14px;margin-top:4px}
.bilan-row-label{color:var(--muted);font-family:var(--font-mono)}
.bilan-row-val{font-family:var(--font-mono)}
.gauge-label{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin:14px 0 6px}
.gauge-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.gauge-fill{height:100%;border-radius:3px;transition:width .5s,background .5s}

/* BOTTOM NAV (mobile) */
.bottom-nav{display:none}
@media(max-width:600px){
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom))}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-family:var(--font-head);cursor:pointer;padding:4px 0;transition:color .15s}
  .bnav-btn.active,.bnav-btn:hover{color:var(--accent)}
  .bnav-icon{font-size:20px;line-height:1}
}

/* CHIPS */
.chip{display:inline-block;font-size:11px;font-family:var(--font-mono);padding:3px 8px;border-radius:20px;margin-top:6px}
.chip-green{background:var(--green-dim);color:var(--green)}
.chip-red{background:var(--red-dim);color:var(--red)}
.chip-muted{background:var(--surface2);color:var(--muted)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 16px;color:var(--muted);font-family:var(--font-mono);font-size:13px}
.empty-icon{font-size:40px;margin-bottom:12px}

/* YEAR DELETE BTN */
.year-del-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;line-height:1;padding:2px 4px;border-radius:4px;opacity:0;transition:opacity .15s,color .15s}
.year-card:hover .year-del-btn{opacity:1}
.year-del-btn:hover{color:var(--red)}

/* YEAR ADD CARD */
.year-add-card{background:transparent;border:1px dashed var(--border2);border-radius:var(--r);padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:border-color .15s,background .15s;min-height:88px}
.year-add-card:hover{border-color:var(--accent);background:var(--accent-dim)}
.year-add-icon{font-size:28px;font-weight:300;color:var(--muted);line-height:1;transition:color .15s}
.year-add-card:hover .year-add-icon{color:var(--accent)}
.year-add-label{font-size:12px;color:var(--muted);font-family:var(--font-mono);transition:color .15s}
.year-add-card:hover .year-add-label{color:var(--accent)}

/* INSTALL BANNER */
#install-banner{display:none;margin:12px 16px;background:var(--accent-dim);border:1px solid rgba(200,241,53,0.2);border-radius:var(--r);padding:14px 16px;align-items:center;gap:12px}
#install-banner p{font-size:13px;color:var(--accent);flex:1}
#install-btn{background:var(--accent);color:#0c0c0e;border:none;border-radius:var(--r-sm);padding:8px 14px;font-size:13px;font-weight:700;font-family:var(--font-head);cursor:pointer;white-space:nowrap}
#dismiss-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0}
</style>
</head>
<body>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <p>Installer l'app sur cet appareil ?</p>
  <button id="install-btn">Installer</button>
  <button id="dismiss-btn">✕</button>
</div>

<!-- SCREEN : ANNÉES -->
<div id="screen-year" class="screen active">
  <div class="topbar">
    <div>
      <div class="topbar-title">Mes Finances</div>
      <div class="topbar-sub">Sélectionner une année</div>
    </div>
  </div>
  <div class="year-grid" id="year-grid"></div>
</div>

<!-- SCREEN : MOIS -->
<div id="screen-month" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('year')">← Retour</button>
    <div style="text-align:right">
      <div class="topbar-title" id="month-screen-title">2025</div>
      <div class="topbar-sub">Choisir un mois</div>
    </div>
  </div>
  <div class="month-grid" id="month-grid"></div>
</div>

<!-- SCREEN : DÉTAIL -->
<div id="screen-detail" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('month')">← Retour</button>
    <div style="text-align:right">
      <div class="topbar-title" id="detail-title">Janvier 2025</div>
    </div>
  </div>
  <div class="flash" id="flash"></div>
  <div id="sections-container"></div>
  <div class="bilan" id="bilan"></div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" onclick="goTo('year')"><span class="bnav-icon">🏠</span>Accueil</button>
  <button class="bnav-btn" onclick="goTo('month')"><span class="bnav-icon">📅</span>Mois</button>
</div>

<script>
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const SECTIONS = [
  {key:'revenus',  label:'Revenus',            color:'#3dd68c', placeholder:'Ex : Salaire'},
  {key:'epargne',  label:'Épargne',             color:'#60a5fa', placeholder:'Ex : Livret A'},
  {key:'fixes',    label:'Dépenses fixes',      color:'#a78bfa', placeholder:'Ex : Loyer'},
  {key:'variables',label:'Dépenses variables',  color:'#fbbf24', placeholder:'Ex : Courses'},
];
const STORAGE_KEY = 'finances_v1';

let currentYear = 2025, currentMonth = 0;
let collapsed = {};

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function getYears() {
  const d = loadData();
  const stored = d.__years__;
  if (Array.isArray(stored) && stored.length) return stored.slice().sort((a,b) => b - a);
  const cur = new Date().getFullYear();
  return [cur];
}
function saveYears(arr) {
  const d = loadData();
  d.__years__ = arr.slice().sort((a,b) => b - a);
  saveData(d);
}
function addYear(y) {
  const years = getYears();
  if (!years.includes(y)) { years.push(y); saveYears(years); }
}
function deleteYear(y) {
  let years = getYears().filter(x => x !== y);
  if (!years.length) years = [new Date().getFullYear()];
  saveYears(years);
  const d = loadData();
  delete d[y];
  saveData(d);
}

function getMonth(y, m) {
  const d = loadData();
  if (!d[y]) d[y] = {};
  if (!d[y][m]) d[y][m] = {revenus:[],epargne:[],fixes:[],variables:[]};
  return d[y][m];
}
function setMonth(y, m, data) {
  const d = loadData();
  if (!d[y]) d[y] = {};
  d[y][m] = data;
  saveData(d);
}

function fmt(v) {
  return Math.round(v).toLocaleString('fr-FR') + ' €';
}
function total(arr) { return arr.reduce((s,t) => s + t.amount, 0); }

function summary(y, m) {
  const mo = getMonth(y, m);
  const rev = total(mo.revenus), ep = total(mo.epargne);
  const fix = total(mo.fixes), vr = total(mo.variables);
  return {rev, ep, fix, vr, rav: rev - ep - fix - vr};
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0,0);
  if (screen === 'year') renderYears();
  if (screen === 'month') renderMonths();
  if (screen === 'detail') renderDetail();
}

// ── ANNÉES ─────────────────────────────────────────────────────────
function renderYears() {
  const years = getYears();
  const g = document.getElementById('year-grid');
  const cards = years.map(y => {
    const nets = Array.from({length:12}, (_, m) => summary(y, m).rav);
    const annual = nets.reduce((s, v) => s + v, 0);
    const data = loadData()[y];
    const hasData = data && Object.values(data).some(m =>
      m.revenus?.length || m.fixes?.length || m.variables?.length || m.epargne?.length
    );
    const chip = hasData
      ? `<span class="chip ${annual>=0?'chip-green':'chip-red'}">${annual>=0?'+':''}${fmt(annual)}</span>`
      : `<span class="chip chip-muted">Aucune donnée</span>`;
    return `<div class="year-card" onclick="selectYear(${y})" style="position:relative">
      <button class="year-del-btn" onclick="event.stopPropagation();confirmDelYear(${y})" title="Supprimer ${y}">✕</button>
      <div class="year-num">${y}</div>
      <div>${chip}</div>
    </div>`;
  }).join('');

  const addCard = `<div class="year-add-card" onclick="promptAddYear()">
    <div class="year-add-icon">+</div>
    <div class="year-add-label">Ajouter une année</div>
  </div>`;

  g.innerHTML = cards + addCard;
}

function promptAddYear() {
  const input = prompt('Quelle année ajouter ?', new Date().getFullYear() + 1);
  if (!input) return;
  const y = parseInt(input);
  if (isNaN(y) || y < 1900 || y > 2100) { alert('Année invalide.'); return; }
  addYear(y);
  renderYears();
}

function confirmDelYear(y) {
  const data = loadData()[y];
  const hasData = data && Object.values(data).some(m =>
    m.revenus?.length || m.fixes?.length || m.variables?.length || m.epargne?.length
  );
  const msg = hasData
    ? `Supprimer ${y} et toutes ses données ? Cette action est irréversible.`
    : `Supprimer l'année ${y} ?`;
  if (confirm(msg)) { deleteYear(y); renderYears(); }
}

function selectYear(y) {
  currentYear = y;
  document.getElementById('month-screen-title').textContent = y;
  goTo('month');
}

// ── MOIS ───────────────────────────────────────────────────────────
function renderMonths() {
  const g = document.getElementById('month-grid');
  g.innerHTML = MONTHS.map((mn, m) => {
    const s = summary(currentYear, m);
    const hasData = getMonth(currentYear, m).revenus.length
      || getMonth(currentYear, m).fixes.length
      || getMonth(currentYear, m).variables.length;
    const color = s.rav >= 0 ? 'var(--green)' : 'var(--red)';
    const ravStr = hasData
      ? `<div class="month-rav" style="color:${color}">${s.rav>=0?'+':''}${fmt(s.rav)}</div>`
      : `<div class="month-rav" style="color:var(--muted)">—</div>`;
    return `<div class="month-card" onclick="selectMonth(${m})">
      <div class="month-name">${mn}</div>
      ${ravStr}
    </div>`;
  }).join('');
}

function selectMonth(m) {
  currentMonth = m;
  document.getElementById('detail-title').textContent = MONTHS[m] + ' ' + currentYear;
  goTo('detail');
}

// ── DÉTAIL ─────────────────────────────────────────────────────────
function renderDetail() {
  renderFlash();
  renderSections();
  renderBilan();
}

function renderFlash() {
  const s = summary(currentYear, currentMonth);
  const color = s.rav >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('flash').innerHTML = `
    <div class="flash-label">Reste à vivre</div>
    <div class="flash-amount" style="color:${color}">${s.rav>=0?'+':''}${fmt(s.rav)}</div>
    <div class="flash-row">
      <div class="flash-item">
        <div class="flash-item-label">Revenus</div>
        <div class="flash-item-val" style="color:var(--green)">${fmt(s.rev)}</div>
      </div>
      <div class="flash-item">
        <div class="flash-item-label">Épargne</div>
        <div class="flash-item-val" style="color:var(--blue)">${fmt(s.ep)}</div>
      </div>
      <div class="flash-item">
        <div class="flash-item-label">Fixes</div>
        <div class="flash-item-val" style="color:var(--purple)">${fmt(s.fix)}</div>
      </div>
      <div class="flash-item">
        <div class="flash-item-label">Variables</div>
        <div class="flash-item-val" style="color:var(--amber)">${fmt(s.vr)}</div>
      </div>
    </div>`;
}

function renderSections() {
  const mo = getMonth(currentYear, currentMonth);
  document.getElementById('sections-container').innerHTML = SECTIONS.map(sec => {
    const items = mo[sec.key];
    const tot = total(items);
    const isCollapsed = collapsed[sec.key];
    const txHTML = items.length
      ? items.map((t,i) => `
          <div class="tx-item">
            <span class="tx-name">${escHtml(t.label)}</span>
            <div class="tx-right">
              <span class="tx-amount" style="color:${sec.color}">${fmt(t.amount)}</span>
              <button class="tx-del" onclick="delTx('${sec.key}',${i})" title="Supprimer">×</button>
            </div>
          </div>`).join('')
      : `<div class="tx-empty">Aucune entrée</div>`;

    return `<div class="section-block">
      <div class="section-header" onclick="toggleSec('${sec.key}')">
        <div class="section-left">
          <span class="section-dot" style="background:${sec.color}"></span>
          <span class="section-name">${sec.label}</span>
        </div>
        <span class="section-total" style="color:${sec.color}">${fmt(tot)}</span>
      </div>
      <div class="section-body${isCollapsed?' hidden':''}">
        <div class="tx-list">${txHTML}</div>
        <div class="add-row">
          <input id="inp-l-${sec.key}" placeholder="${sec.placeholder}" onkeydown="if(event.key==='Enter')addTx('${sec.key}')"/>
          <input id="inp-a-${sec.key}" type="number" min="0" placeholder="0 €" class="inp-amount" onkeydown="if(event.key==='Enter')addTx('${sec.key}')"/>
          <button onclick="addTx('${sec.key}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderBilan() {
  const s = summary(currentYear, currentMonth);
  const prevM = currentMonth === 0 ? 11 : currentMonth - 1;
  const prevY = currentMonth === 0 ? currentYear - 1 : currentYear;
  const hasPrev = getYears().includes(prevY);
  const prev = hasPrev ? summary(prevY, prevM) : null;

  const rows = [
    ['Revenus', fmt(s.rev), 'var(--green)'],
    ['Épargne', '− ' + fmt(s.ep), 'var(--blue)'],
    ['Dépenses fixes', '− ' + fmt(s.fix), 'var(--purple)'],
    ['Dépenses variables', '− ' + fmt(s.vr), 'var(--amber)'],
    ['Reste à vivre', (s.rav>=0?'+ ':'')+fmt(s.rav), s.rav>=0?'var(--green)':'var(--red)'],
  ];

  let gaugeHTML = '';
  if (prev && (prev.vr > 0 || s.vr > 0)) {
    const pct = prev.vr > 0 ? Math.min(150, Math.round(s.vr / prev.vr * 100)) : 100;
    const gc = pct > 110 ? 'var(--red)' : pct > 90 ? 'var(--amber)' : 'var(--green)';
    const prevName = MONTHS[prevM] + (prevY !== currentYear ? ' '+prevY : '');
    gaugeHTML = `
      <div class="gauge-label">Variables vs ${prevName} : ${pct}%</div>
      <div class="gauge-track"><div class="gauge-fill" style="width:${Math.min(100,pct)}%;background:${gc}"></div></div>`;
  } else {
    gaugeHTML = `<div class="gauge-label" style="margin-top:14px">Pas de données du mois précédent</div>`;
  }

  document.getElementById('bilan').innerHTML = `
    <div class="bilan-title">Bilan du mois</div>
    ${rows.map(r => `
      <div class="bilan-row">
        <span class="bilan-row-label">${r[0]}</span>
        <span class="bilan-row-val" style="color:${r[2]}">${r[1]}</span>
      </div>`).join('')}
    ${gaugeHTML}`;
}

function toggleSec(key) {
  collapsed[key] = !collapsed[key];
  renderSections();
}

function addTx(key) {
  const lEl = document.getElementById('inp-l-'+key);
  const aEl = document.getElementById('inp-a-'+key);
  const label = lEl.value.trim();
  const amount = parseFloat(aEl.value);
  if (!label || isNaN(amount) || amount <= 0) { lEl.focus(); return; }
  const mo = getMonth(currentYear, currentMonth);
  mo[key].push({label, amount});
  setMonth(currentYear, currentMonth, mo);
  lEl.value = ''; aEl.value = '';
  renderDetail();
  lEl.focus();
}

function delTx(key, idx) {
  const mo = getMonth(currentYear, currentMonth);
  mo[key].splice(idx, 1);
  setMonth(currentYear, currentMonth, mo);
  renderDetail();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PWA INSTALL ────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  banner.style.display = 'flex';
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});
document.getElementById('dismiss-btn').addEventListener('click', () => {
  document.getElementById('install-banner').style.display = 'none';
});

// ── SERVICE WORKER (offline) ───────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'finances-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── INIT ───────────────────────────────────────────────────────────
// Ajouter l'année courante si aucune année n'existe encore
if (!loadData().__years__) saveYears([new Date().getFullYear()]);
renderYears();
</script>
