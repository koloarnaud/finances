<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0c0c0e"/>
<title>Fin'Ko - Sécurisé</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0c0c0e; --surface: #141416; --surface2: #1c1c20; --border: rgba(255,255,255,0.07);
  --text: #f0ede8; --muted: #7a7870; --accent: #c8f135; --accent-dim: rgba(200,241,53,0.12);
  --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace; --r: 16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-head);min-height:100vh;}

/* ÉCRAN PIN */
.screen-pin { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pin-dots { display: flex; gap: 20px; margin: 30px 0; }
.dot { width: 15px; height: 15px; border: 2px solid var(--accent); border-radius: 50%; transition: 0.2s; }
.dot.filled { background: var(--accent); }
.keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
.key { width: 80px; height: 80px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; cursor: pointer; user-select: none; }
.key:active { background: var(--accent); color: #000; }

/* ÉCRANS APP */
.screen { display: none; padding: 20px; text-align: center; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; animation: fadeIn .3s ease; }
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.welcome-title { font-size: 42px; font-weight: 800; color: var(--accent); margin-bottom: 10px; margin-top: 20px;}
.btn-main { background: var(--accent); color: #000; border: none; padding: 18px 40px; border-radius: 40px; font-weight: 700; font-size: 18px; cursor: pointer; margin-top: 30px; }
.year-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
.year-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 30px 20px; cursor: pointer; }

/* ZONE BAS DE PAGE */
.sync-zone { margin-top: auto; padding: 20px; background: var(--surface); border-radius: var(--r); border: 1px dashed var(--border); }
.sync-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
.btn-sync { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 11px; cursor: pointer; font-family: var(--font-mono); }
</style>
</head>
<body>

<div id="screen-pin" class="screen-pin">
    <div id="pin-instruction" style="margin-bottom: 10px; font-size: 14px; color: var(--muted);">Entrez votre code PIN</div>
    <div class="pin-dots"><div class="dot" id="dot-0"></div><div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div></div>
    <div class="keypad">
        <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
        <div class="key" style="background:transparent"></div><div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="press('del')" style="font-size:14px">Effacer</div>
    </div>
</div>

<div id="screen-welcome" class="screen">
    <div style="font-size: 60px; margin-top: 20vh;">💰</div>
    <h1 class="welcome-title">Fin'Ko</h1>
    <p style="color:var(--muted)">Votre gestionnaire privé.</p>
    <button class="btn-main" onclick="goTo('year')">Dashboard</button>
</div>

<div id="screen-year" class="screen">
    <h2 style="text-align:left; margin-top:20px">Années</h2>
    <div class="year-grid" id="year-grid"></div>

    <div class="sync-zone">
        <p style="font-size: 10px; color: var(--muted);">OPTIONS & SÉCURITÉ</p>
        <div class="sync-btns">
            <button class="btn-sync" onclick="exportData()">📤 Save</button>
            <button class="btn-sync" onclick="document.getElementById('fileInput').click()">📥 Load</button>
            <button class="btn-sync" onclick="startChangePin()">🔑 Changer PIN</button>
            <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
        </div>
    </div>
</div>

<script>
let currentPinInput = "";
let isChangingPin = false;
const STORAGE_KEY = 'finko_data_v1';
const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { __years__: [2024, 2025, 2026], __pin__: null };

// --- LOGIQUE PIN ---
function getSavedPin() { return data.__pin__; }

if (!getSavedPin()) {
    document.getElementById('pin-instruction').textContent = "Créez votre code PIN";
}

function press(val) {
    if (val === 'del') { currentPinInput = currentPinInput.slice(0, -1); }
    else if (currentPinInput.length < 4) { currentPinInput += val; }
    updateDots();
    if (currentPinInput.length === 4) { setTimeout(validatePin, 200); }
}

function updateDots() {
    for (let i = 0; i < 4; i++) {
        document.getElementById(`dot-${i}`).classList.toggle('filled', i < currentPinInput.length);
    }
}

function validatePin() {
    const savedPin = getSavedPin();
    if (!savedPin) { // Création initiale
        data.__pin__ = currentPinInput;
        saveAll();
        unlock();
    } else if (isChangingPin) { // Nouveau PIN lors du changement
        data.__pin__ = currentPinInput;
        saveAll();
        alert("PIN mis à jour !");
        isChangingPin = false;
        unlock();
    } else if (currentPinInput === savedPin) { // Déverrouillage normal
        unlock();
    } else {
        alert("Code incorrect");
        currentPinInput = "";
        updateDots();
    }
}

function unlock() {
    document.getElementById('screen-pin').style.display = 'none';
    goTo('welcome');
    currentPinInput = "";
    updateDots();
}

function startChangePin() {
    const current = prompt("Entrez votre code PIN actuel pour le modifier :");
    if (current === data.__pin__) {
        isChangingPin = true;
        currentPinInput = "";
        updateDots();
        document.getElementById('pin-instruction').textContent = "Entrez votre NOUVEAU code PIN";
        document.getElementById('screen-pin').style.display = 'flex';
    } else {
        alert("Code actuel incorrect.");
    }
}

// --- NAVIGATION ---
function goTo(s) {
    document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
    document.getElementById('screen-' + s).classList.add('active');
    if(s === 'year') renderYears();
}

function renderYears() {
    document.getElementById('year-grid').innerHTML = data.__years__.map(y => `
        <div class="year-card" onclick="alert('Année '+ ${y})">
            <div style="font-size:24px; font-weight:700">${y}</div>
        </div>`).join('');
}

function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function exportData() {
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `finko_backup.json`;
    a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        if(confirm("Écraser les données ?")) {
            localStorage.setItem(STORAGE_KEY, ev.target.result);
            location.reload();
        }
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
