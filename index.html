<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f0f0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fin'Ko"/>
<title>Fin'Ko</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Fin'Ko%22,%22short_name%22:%22Fin'Ko%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f0f0f%22,%22theme_color%22:%22%230f0f0f%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='20'%20fill='%2318181b'/%3E%3Ctext%20y='.9em'%20font-size='80'%20x='10'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0c0c0e; --surface: #141416; --surface2: #1c1c20; --border: rgba(255,255,255,0.07);
  --text: #f0ede8; --muted: #7a7870; --accent: #c8f135; --accent-dim: rgba(200,241,53,0.12);
  --green: #3dd68c; --green-dim: rgba(61,214,140,0.12); --red: #f87171; --red-dim: rgba(248,113,113,0.12);
  --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace; --r: 12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);color:var(--text);font-family:var(--font-head);min-height:100%}
body{max-width:600px;margin:0 auto;padding:0 0 100px;min-height:100vh}

/* --- PIN & WELCOME --- */
.screen-pin { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pin-dots { display: flex; gap: 20px; margin: 30px 0; }
.dot { width: 15px; height: 15px; border: 2px solid var(--accent); border-radius: 50%; }
.dot.filled { background: var(--accent); }
.keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
.key { width: 80px; height: 80px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; cursor: pointer; }
#screen-welcome { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
#screen-welcome.active { display: flex; }

/* --- UI --- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px;margin-bottom:8px}
.topbar-title{font-size:20px;font-weight:700}
.back-btn{background:var(--surface2);border:none;color:var(--muted);padding:8px 14px;border-radius:8px;cursor:pointer}
.screen{display:none;padding:0 16px}
.screen.active{display:block}
.year-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.year-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;position:relative}
.year-del-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.month-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;cursor:pointer}
.flash{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.section-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.section-header{display:flex;justify-content:space-between;padding:14px 16px;cursor:pointer}
.section-body{border-top:1px solid var(--border);padding:12px}
.section-body.hidden{display:none}
.add-row{display:flex;gap:6px;margin-top:10px}
.add-row input{flex:1;background:var(--surface2);border:1px solid var(--border);padding:8px;border-radius:6px;color:#fff}
.tx-item{display:flex;justify-content:space-between;padding:8px;background:var(--surface2);border-radius:6px;margin-bottom:4px}
</style>
</head>
<body>

<div id="screen-pin" class="screen-pin">
    <div id="pin-instruction" style="color:var(--muted); margin-bottom:10px">Entrez votre code PIN</div>
    <div class="pin-dots"><div class="dot" id="dot-0"></div><div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div></div>
    <div class="keypad">
        <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
        <div class="key" style="background:transparent" onclick="startChangePin()">🔑</div><div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="press('del')">⌫</div>
    </div>
</div>

<div id="screen-welcome" class="screen">
    <div style="font-size:64px">💰</div>
    <h1 style="font-size:42px; color:var(--accent)">Fin'Ko</h1>
    <p style="color:var(--muted); margin-top:10px">Gestion privée et sécurisée.</p>
    <button onclick="goTo('year')" style="background:var(--accent); padding:18px 40px; border-radius:40px; border:none; font-weight:700; margin-top:30px; cursor:pointer">Dashboard</button>
</div>

<div id="screen-year" class="screen">
  <div class="topbar">
    <div class="topbar-title">Années</div>
    <button class="back-btn" onclick="addNextYear()" style="font-size:20px; color:var(--accent)">+</button>
  </div>
  <div class="year-grid" id="year-grid"></div>
</div>

<div id="screen-month" class="screen">
  <div class="topbar"><button class="back-btn" onclick="goTo('year')">← Retour</button><div class="topbar-title" id="month-screen-title"></div></div>
  <div class="month-grid" id="month-grid"></div>
</div>

<div id="screen-detail" class="screen">
  <div class="topbar"><button class="back-btn" onclick="goTo('month')">← Retour</button><div class="topbar-title" id="detail-title"></div></div>
  <div class="flash" id="flash"></div>
  <div id="sections-container"></div>
</div>

<script>
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const STORAGE_KEY = 'finances_v1';
let currentYear, currentMonth, pinInput = "";

function loadData() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// PIN
function press(n) {
    if(n==='del') pinInput = pinInput.slice(0,-1);
    else if(pinInput.length < 4) pinInput += n;
    updateDots();
    if(pinInput.length === 4) setTimeout(validatePin, 200);
}
function updateDots() {
    for(let i=0; i<4; i++) document.getElementById('dot-'+i).className = i < pinInput.length ? 'dot filled' : 'dot';
}
function validatePin() {
    const d = loadData();
    if(!d.__pin__) { d.__pin__ = pinInput; saveData(d); unlock(); }
    else if(pinInput === d.__pin__) { unlock(); }
    else { alert("Code erroné"); pinInput = ""; updateDots(); }
}
function unlock() { document.getElementById('screen-pin').style.display='none'; goTo('welcome'); }
function startChangePin() {
    const d = loadData();
    if(prompt("Ancien code ?") === d.__pin__) {
        d.__pin__ = null; saveData(d); location.reload();
    }
}

// GESTION AUTOMATIQUE DES ANNÉES
function getYears() { const d = loadData(); return (d.__years__ || [2025]).sort((a,b)=>b-a); }

function addNextYear() {
    const d = loadData();
    if(!d.__years__) d.__years__ = [2025];
    
    // On trouve l'année la plus haute et on ajoute +1
    const lastYear = Math.max(...d.__years__);
    const nextYear = lastYear + 1;
    
    if(confirm("Ajouter l'année " + nextYear + " ?")) {
        d.__years__.push(nextYear);
        saveData(d);
        renderYears();
    }
}

function deleteYear(y, e) {
    e.stopPropagation();
    if(confirm("Supprimer l'année " + y + " ?")) {
        const d = loadData();
        d.__years__ = d.__years__.filter(x => x !== y);
        delete d[y]; saveData(d); renderYears();
    }
}

function renderYears() {
    const years = getYears();
    document.getElementById('year-grid').innerHTML = years.map(y => `
        <div class="year-card" onclick="currentYear=${y};goTo('month')">
            <button class="year-del-btn" onclick="deleteYear(${y}, event)">×</button>
            <div style="font-size:28px; font-weight:700">${y}</div>
        </div>`).join('');
}

// NAVIGATION
function goTo(s) {
    document.querySelectorAll('.screen').forEach(sc => sc.classList.remove('active'));
    document.getElementById('screen-'+s).classList.add('active');
    if(s==='year') renderYears();
    if(s==='month') renderMonths();
    if(s==='detail') renderDetail();
}

function renderMonths() {
    document.getElementById('month-screen-title').textContent = currentYear;
    document.getElementById('month-grid').innerHTML = MONTHS.map((m, i) => `<div class="month-card" onclick="currentMonth=${i};goTo('detail')">${m}</div>`).join('');
}

function renderDetail() {
    document.getElementById('detail-title').textContent = MONTHS[currentMonth] + ' ' + currentYear;
    const d = loadData(), mo = (d[currentYear] && d[currentYear][currentMonth]) ? d[currentYear][currentMonth] : {revenus:[],epargne:[],fixes:[],variables:[]};
    const sum = (arr) => arr.reduce((s,x)=>s+x.amount, 0);
    const rav = sum(mo.revenus) - sum(mo.epargne) - sum(mo.fixes) - sum(mo.variables);
    document.getElementById('flash').innerHTML = `<div style="font-size:32px; font-weight:700; color:${rav>=0?'var(--green)':'var(--red)'}">${rav} €</div><p>Reste à vivre</p>`;
    const sections = [{k:'revenus', l:'Revenus'}, {k:'epargne', l:'Épargne'}, {k:'fixes', l:'Fixes'}, {k:'variables', l:'Variables'}];
    document.getElementById('sections-container').innerHTML = sections.map(s => `
        <div class="section-block">
            <div class="section-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
                <span>${s.l}</span><span>${sum(mo[s.k])} €</span>
            </div>
            <div class="section-body hidden">
                ${mo[s.k].map(x => `<div class="tx-item"><span>${x.label}</span><span>${x.amount} €</span></div>`).join('')}
                <div class="add-row">
                    <input id="l-${s.k}" placeholder="Nom"><input id="a-${s.k}" type="number" placeholder="€" style="width:60px">
                    <button onclick="addTx('${s.k}')" style="background:var(--accent); border:none; padding:8px 12px; border-radius:6px">+</button>
                </div>
            </div>
        </div>`).join('');
}

function addTx(k) {
    const l = document.getElementById('l-'+k).value, a = parseFloat(document.getElementById('a-'+k).value);
    if(!l || isNaN(a)) return;
    const d = loadData();
    if(!d[currentYear]) d[currentYear] = {};
    if(!d[currentYear][currentMonth]) d[currentYear][currentMonth] = {revenus:[],epargne:[],fixes:[],variables:[]};
    d[currentYear][currentMonth][k].push({label:l, amount:a});
    saveData(d); renderDetail();
}

const initialData = loadData();
if(!initialData.__pin__) document.getElementById('pin-instruction').textContent = "Créez votre code PIN";
</script>
</body>
</html>
